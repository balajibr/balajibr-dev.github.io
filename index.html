<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20-20-20 Eye Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .icon { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sm { width: 18px; height: 18px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        body.compact .compact-hidden { display: none; }
        body.compact .timer-container { transform: scale(0.85); margin-top: -40px; }
        body.compact .controls-container { margin-top: -10px; gap: 10px; }
        
        .settings-panel {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .settings-panel.visible {
            max-height: 250px;
            opacity: 1;
            margin-top: 2rem;
        }
        .shadow-glow-blue { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5)); }
        .shadow-glow-emerald { filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.5)); }
        .shadow-glow-orange { filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.5)); }
    </style>
</head>
<body class="transition-colors duration-700 bg-[#0f172a] text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden" id="body-bg">
    
   
    <div class="timer-container relative flex items-center justify-center w-64 h-64 md:w-80 md:h-80 transition-transform">
        <svg class="w-full h-full">
            <circle cx="50%" cy="50%" r="45%" class="stroke-slate-800 fill-none" stroke-width="8" />
            <circle id="progress-ring" cx="50%" cy="50%" r="45%" class="progress-ring__circle fill-none stroke-blue-500 shadow-glow-blue" stroke-width="8" stroke-linecap="round" />
        </svg>
        
        <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span id="status-label" class="text-sm font-medium uppercase tracking-widest text-slate-500">Focus</span>
            <span id="timer-display" class="text-6xl font-mono font-bold">20:00</span>
        </div>
    </div>

    <div class="controls-container flex flex-wrap justify-center gap-4 mt-10 z-10">
        <button id="reset-btn" class="p-4 rounded-full bg-slate-800 shadow-xl text-slate-400 hover:text-red-400 transition-colors" title="Reset">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        
        <button id="toggle-btn" class="p-6 rounded-full shadow-2xl transform transition-transform active:scale-95 bg-blue-600 text-white" title="Start/Pause">
            <span id="play-icon">
                <svg class="icon ml-1" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </span>
            <span id="pause-icon" class="hidden">
                <svg class="icon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </span>
        </button>

        <button id="settings-toggle-btn" class="p-4 rounded-full bg-slate-800 shadow-xl text-slate-400 hover:text-blue-400 transition-colors" title="Settings">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>

        <button id="compact-toggle" class="p-4 rounded-full bg-slate-800 shadow-xl text-slate-400 hover:text-purple-400 transition-colors" title="Widget Mode">
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        </button>
    </div>

    <div id="settings-panel" class="settings-panel w-full max-w-sm px-4">
        <div class="bg-slate-800/50 backdrop-blur-md p-6 rounded-3xl border border-slate-700 shadow-2xl space-y-6 mt-4">
            <div class="flex items-center justify-between">
                <label for="work-duration-input" class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Work (mins)</label>
                <input type="number" id="work-duration-input" value="20" min="1" max="120" class="w-16 px-2 py-1 bg-slate-900 border border-slate-700 rounded-lg text-center font-bold text-blue-400 outline-none focus:ring-1 focus:ring-blue-500">
            </div>

            <div class="flex items-center justify-between gap-2">
                <button id="sound-toggle" class="flex items-center gap-3 px-4 py-2 rounded-xl bg-slate-900 border border-slate-700 text-slate-300 transition-colors flex-1 justify-center">
                    <span id="sound-on-icon"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></span>
                    <span id="sound-off-icon" class="hidden"><svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m8.7 3A6 6 0 0 1 18 8a21.3 21.3 0 0 1 .6 2.8"/><path d="M17 17H3s3-2 3-9a4.67 4.67 0 0 1 .3-1.7"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><path d="m2 2 20 20"/></svg></span>
                    <span id="sound-status-text" class="text-sm font-medium">On</span>
                </button>
                <button id="notif-btn" class="px-4 py-2 rounded-xl bg-slate-900 border border-slate-700 text-blue-400 text-sm font-bold uppercase tracking-widest flex-1">Alerts</button>
            </div>
            
            <button id="test-btn" class="w-full text-[10px] text-slate-500 hover:text-slate-300 uppercase tracking-widest text-center">Test Grace Period Sound</button>
        </div>
    </div>

    <script>
        // Load settings from localStorage
        const storage = {
            get: (key, def) => {
                const val = localStorage.getItem(key);
                return val === null ? def : (isNaN(val) ? val : parseInt(val));
            },
            set: (key, val) => localStorage.setItem(key, val)
        };

        let workTimeMinutes = storage.get('workMins', 20);
        let soundEnabled = storage.get('soundEnabled', 'true') === 'true';
        
        const BREAK_TIME = 20;
        const WARNING_TIME = 5;
        const CIRCUMFERENCE = 2 * Math.PI * 45;

        let timeLeft = workTimeMinutes * 60;
        let isActive = false;
        let isWorking = true;
        let isWarning = false;
        let timerId = null;
        let audioCtx = null;

        const timerDisplay = document.getElementById('timer-display');
        const statusLabel = document.getElementById('status-label');
        const progressRing = document.getElementById('progress-ring');
        const bodyBg = document.getElementById('body-bg');
        const toggleBtn = document.getElementById('toggle-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const soundToggle = document.getElementById('sound-toggle');
        const soundOnIcon = document.getElementById('sound-on-icon');
        const soundOffIcon = document.getElementById('sound-off-icon');
        const soundStatusText = document.getElementById('sound-status-text');
        const eyeIconWork = document.getElementById('eye-icon-work');
        const eyeIconBreak = document.getElementById('eye-icon-break');
        const workInput = document.getElementById('work-duration-input');
        const settingsPanel = document.getElementById('settings-panel');

        // Init inputs
        workInput.value = workTimeMinutes;
        soundOnIcon.classList.toggle('hidden', !soundEnabled);
        soundOffIcon.classList.toggle('hidden', soundEnabled);
        soundStatusText.textContent = soundEnabled ? 'On' : 'Muted';

        progressRing.style.strokeDasharray = `${CIRCUMFERENCE}%`;

        function playBeep(freq = 440, duration = 0.5, volume = 0.2) {
            if (!soundEnabled) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { console.error(e); }
        }

        function sendNotification(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body });
            }
        }

        function updateUI() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            let total = workTimeMinutes * 60;
            if (isWarning) total = WARNING_TIME;
            else if (!isWorking) total = BREAK_TIME;

            const progress = ((total - timeLeft) / total);
            const offset = CIRCUMFERENCE - (progress * CIRCUMFERENCE);
            progressRing.style.strokeDashoffset = `${offset}%`;

            if (isWarning) {
                bodyBg.style.backgroundColor = "#431407"; // Deep Orange/Red
                statusLabel.textContent = "Finish up...";
                progressRing.className = "progress-ring__circle fill-none stroke-orange-500 shadow-glow-orange";
            } else if (isWorking) {
                bodyBg.style.backgroundColor = "#0f172a";
                statusLabel.textContent = "Focus";
                progressRing.className = "progress-ring__circle fill-none stroke-blue-500 shadow-glow-blue";
                eyeIconWork.classList.remove('hidden');
                eyeIconBreak.classList.add('hidden');
            } else {
                bodyBg.style.backgroundColor = "#064e3b";
                statusLabel.textContent = "Break";
                progressRing.className = "progress-ring__circle fill-none stroke-emerald-500 shadow-glow-emerald";
                eyeIconWork.classList.add('hidden');
                eyeIconBreak.classList.remove('hidden');
            }

            if (isActive) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                toggleBtn.classList.replace('bg-blue-600', 'bg-orange-600');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                toggleBtn.classList.replace('bg-orange-600', 'bg-blue-600');
            }
        }

        function handleTransition() {
            if (isWorking) {
                // Work ended -> Start 5s Warning
                playBeep(440, 1.5, 0.4); // One long Warning beep
                isWorking = false;
                isWarning = true;
                timeLeft = WARNING_TIME;
                sendNotification("Break starting in 5s", "Finish what you're doing!");
            } else if (isWarning) {
                // Warning ended -> Start 20s Break
                isWarning = false;
                timeLeft = BREAK_TIME;
                sendNotification("Break started!", "Look 20 feet away now.");
            } else {
                // Break ended -> Back to Work
                playBeep(880, 0.5, 0.3);
                isWorking = true;
                isWarning = false;
                timeLeft = workTimeMinutes * 60;
                sendNotification("Back to work", "Session started.");
            }
            updateUI();
        }

        function tick() {
            if (isActive && timeLeft > 0) {
                timeLeft--;
                // Repeating beeps only during actual Break phase
                if (!isWorking && !isWarning) {
                    playBeep(660, 0.2, 0.3); 
                }
                updateUI();
            } else if (timeLeft === 0) {
                handleTransition();
            }
        }

        toggleBtn.addEventListener('click', () => {
            isActive = !isActive;
            if (isActive && !timerId) timerId = setInterval(tick, 1000);
            updateUI();
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            isActive = false;
            isWorking = true;
            isWarning = false;
            timeLeft = workTimeMinutes * 60;
            clearInterval(timerId);
            timerId = null;
            updateUI();
        });

        workInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value) || 20;
            workTimeMinutes = Math.max(1, Math.min(120, val));
            e.target.value = workTimeMinutes;
            storage.set('workMins', workTimeMinutes);
            if (isWorking && !isWarning && !isActive) {
                timeLeft = workTimeMinutes * 60;
                updateUI();
            }
        });

        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            storage.set('soundEnabled', soundEnabled);
            soundOnIcon.classList.toggle('hidden', !soundEnabled);
            soundOffIcon.classList.toggle('hidden', soundEnabled);
            soundStatusText.textContent = soundEnabled ? 'On' : 'Muted';
        });

        document.getElementById('settings-toggle-btn').addEventListener('click', () => {
            settingsPanel.classList.toggle('visible');
        });

        document.getElementById('compact-toggle').addEventListener('click', () => {
            document.body.classList.toggle('compact');
            settingsPanel.classList.remove('visible');
        });

        document.getElementById('notif-btn').addEventListener('click', () => {
            Notification.requestPermission();
        });

        document.getElementById('test-btn').addEventListener('click', () => {
            playBeep(440, 1.5, 0.4); // Test the long warning beep
        });

        updateUI();
    </script>
</body>
</html>
